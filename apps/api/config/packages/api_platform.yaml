api_platform:
    title: Tadaaa API
    version: 0.3.0
    formats:
        jsonld: ['application/ld+json']
        json: ['application/json']
    mcp:
        enabled: true
        format: json
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']

when@prod:
    api_platform:
        enable_swagger_ui: false
        enable_re_doc: false
        enable_docs: false
        enable_entrypoint: false
